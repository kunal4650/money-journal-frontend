<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f8fafc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://api.iconify.design/solar/wallet-money-bold-duotone.svg?color=%2310b981&width=192&height=192">
    
    <title>Page Not Found - MyExpenseJournal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    
    <div class="absolute top-[-10%] right-[-10%] w-72 h-72 bg-emerald-400/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-72 h-72 bg-blue-400/20 rounded-full blur-[100px] pointer-events-none"></div>
    
    <div class="w-full max-w-md bg-white border border-slate-100 rounded-[2.5rem] p-8 shadow-2xl relative z-10 text-center">
        <div class="w-20 h-20 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center mx-auto mb-6">
            <iconify-icon icon="solar:ghost-bold-duotone" class="text-5xl"></iconify-icon>
        </div>
        
        <h1 class="text-6xl font-black tracking-tight text-slate-900 mb-2">404</h1>
        <h2 class="text-xl font-bold text-slate-800 mb-3">Page Not Found</h2>
        <p class="text-sm font-semibold text-slate-500 mb-8 leading-relaxed">Oops! The page you are looking for doesn't exist or has been moved.</p>

        <button onclick="goHome()" class="w-full py-4 bg-slate-900 text-white font-bold rounded-xl shadow-lg hover:bg-slate-800 transition-all active:scale-95 flex justify-center items-center gap-2">
            Return Home <iconify-icon icon="solar:home-smile-angle-bold" class="text-lg"></iconify-icon>
        </button>
    </div>

    <script>
        // Intelligently routing them back to Dashboard if they are logged in!
        function goHome() {
            if (localStorage.getItem('token')) {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
