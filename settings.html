<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings - MyExpenseJournal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .glass-header { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.85); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .premium-card { background: #ffffff; border: 1px solid rgba(0, 0, 0, 0.04); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); }
        .page-enter { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input { -webkit-appearance: none; outline: none; }
    </style>
</head>
<body class="pb-32 antialiased min-h-screen relative">

    <!-- Beautiful In-App Toast Notification -->
    <div id="toast" class="fixed top-[-100%] left-1/2 -translate-x-1/2 z-[100] transition-all duration-300 pointer-events-none">
        <div class="bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl font-bold text-sm flex items-center gap-3 border border-slate-700">
            <iconify-icon id="toastIcon" icon="solar:check-circle-bold" class="text-emerald-400 text-xl"></iconify-icon>
            <span id="toastMsg" class="whitespace-nowrap">Success</span>
        </div>
    </div>

    <nav class="sticky top-0 z-40 glass-header px-6 py-4">
        <h1 class="text-lg font-extrabold tracking-tight text-slate-900">Settings</h1>
        <p class="text-[10px] font-semibold text-slate-500">App preferences & data</p>
    </nav>

    <main class="max-w-md mx-auto px-4 pt-6 space-y-4 page-enter">
        
        <div class="premium-card rounded-2xl p-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-slate-100 text-slate-600 flex items-center justify-center"><iconify-icon icon="solar:user-bold" class="text-xl"></iconify-icon></div>
                <div><p class="text-sm font-bold text-slate-900">My Account</p><p class="text-[10px] font-bold text-emerald-600">Secured via JWT</p></div>
            </div>
        </div>

        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mt-6 mb-2 px-1">Preferences</h3>
        
        <div class="premium-card rounded-2xl p-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center"><iconify-icon icon="solar:target-bold" class="text-xl"></iconify-icon></div>
                <div class="text-left"><p class="text-sm font-bold text-slate-900">Monthly Budget</p><p class="text-[10px] text-slate-500">Your spending limit</p></div>
            </div>
            <div class="relative w-28">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-sm font-bold text-slate-400">₹</span>
                <!-- Saves automatically when you click off the input box -->
                <input type="number" id="budgetInput" onblur="saveBudget()" class="w-full pl-7 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-800 focus:border-emerald-500 text-right text-sm transition-colors">
            </div>
        </div>

        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mt-6 mb-2 px-1">Data Management</h3>
        
        <button onclick="downloadCSV()" class="w-full premium-card rounded-2xl p-4 flex items-center justify-between hover:bg-slate-50 transition-colors active:scale-95">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center"><iconify-icon icon="solar:document-add-bold" class="text-xl"></iconify-icon></div>
                <div class="text-left"><p class="text-sm font-bold text-slate-900">Export to CSV</p><p class="text-[10px] text-slate-500">Download for Excel</p></div>
            </div>
            <iconify-icon icon="solar:alt-arrow-right-linear" class="text-slate-400"></iconify-icon>
        </button>

        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mt-6 mb-2 px-1">Legal & Info</h3>
        
        <div class="premium-card rounded-2xl overflow-hidden">
            <a href="privacy.html" class="flex items-center justify-between p-4 border-b border-slate-100 hover:bg-slate-50 transition-colors">
                <div class="flex items-center gap-3"><iconify-icon icon="solar:shield-check-bold" class="text-xl text-slate-400"></iconify-icon><p class="text-sm font-bold text-slate-700">Privacy Policy</p></div>
                <iconify-icon icon="solar:alt-arrow-right-linear" class="text-slate-400"></iconify-icon>
            </a>
            <a href="disclaimer.html" class="flex items-center justify-between p-4 hover:bg-slate-50 transition-colors">
                <div class="flex items-center gap-3"><iconify-icon icon="solar:info-circle-bold" class="text-xl text-slate-400"></iconify-icon><p class="text-sm font-bold text-slate-700">Disclaimer</p></div>
                <iconify-icon icon="solar:alt-arrow-right-linear" class="text-slate-400"></iconify-icon>
            </a>
        </div>

        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mt-6 mb-2 px-1">Danger Zone</h3>

        <button onclick="logout()" class="w-full premium-card rounded-2xl p-4 flex items-center justify-between border-rose-100 hover:bg-rose-50 transition-colors active:scale-95">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-rose-100 text-rose-600 flex items-center justify-center"><iconify-icon icon="solar:logout-3-bold" class="text-xl"></iconify-icon></div>
                <div class="text-left"><p class="text-sm font-bold text-rose-600">Log Out</p><p class="text-[10px] text-rose-400">End secure session</p></div>
            </div>
        </button>
    </main>

    <!-- Floating Pill Navigation -->
    <div class="fixed bottom-6 inset-x-0 z-40 flex justify-center px-6 pointer-events-none">
        <nav class="w-full max-w-md bg-white/90 backdrop-blur-xl border border-slate-200 shadow-[0_20px_40px_-10px_rgba(0,0,0,0.1)] rounded-[2rem] px-6 py-4 flex items-center justify-between pointer-events-auto">
            <a href="dashboard.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600"><iconify-icon icon="solar:home-smile-angle-linear" class="text-xl"></iconify-icon></a>
            <a href="history.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600"><iconify-icon icon="solar:document-text-linear" class="text-xl"></iconify-icon></a>
            <a href="analytics.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600"><iconify-icon icon="solar:chart-square-linear" class="text-xl"></iconify-icon></a>
            <a href="settings.html" class="flex flex-col items-center gap-1 text-emerald-600"><iconify-icon icon="solar:settings-bold" class="text-xl"></iconify-icon></a>
        </nav>
    </div>

    <script src="js/config.js"></script>
    <script>
        if (!localStorage.getItem('token')) window.location.href = 'login.html';

        // Toast Notification System
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = message;
            document.getElementById('toastIcon').className = isError ? "text-rose-400 text-xl" : "text-emerald-400 text-xl";
            document.getElementById('toastIcon').setAttribute('icon', isError ? "solar:danger-circle-bold" : "solar:check-circle-bold");
            
            toast.style.top = "2.5rem"; // Slide down
            if(navigator.vibrate) navigator.vibrate(isError ? [50, 50, 50] : 50); // Haptic Feedback
            
            setTimeout(() => { toast.style.top = "-100%"; }, 3000); // Slide up
        }

        // Load & Save Budget
        function loadBudget() {
            document.getElementById('budgetInput').value = localStorage.getItem('budgetLimit') || 25000;
        }

        function saveBudget() {
            const val = document.getElementById('budgetInput').value;
            if(val && val > 0) {
                localStorage.setItem('budgetLimit', val);
                showToast("Budget updated successfully!");
            }
        }

        async function downloadCSV() {
            try {
                const res = await fetch(`${API_BASE_URL}/transactions`, { headers: getAuthHeaders() });
                if (!res.ok) throw new Error(); const txData = await res.json();
                if(txData.length === 0) return showToast("No data to export.", true);

                let csv = 'Date,Type,Category,Wallet,Amount,Notes\n';
                txData.forEach(row => { csv += `"${new Date(row.date).toISOString().split('T')[0]}","${row.type}","${row.category}","${row.wallet}","${row.amount}","${row.notes || ''}"\n`; });

                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a'); a.setAttribute('href', url); a.setAttribute('download', 'MyExpenseJournal_Export.csv'); a.click();
                showToast("Export successful!");
            } catch (err) { showToast('Export failed', true); }
        }
        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
        
        window.onload = loadBudget;
    </script>
</body>
</html>
