<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Analytics - MyExpenseJournal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .glass-header { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.85); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .premium-card { background: #ffffff; border: 1px solid rgba(0, 0, 0, 0.04); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); }
        .page-enter { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-32 antialiased min-h-screen">

    <nav class="sticky top-0 z-40 glass-header px-6 py-4">
        <h1 class="text-lg font-extrabold tracking-tight text-slate-900">Analytics</h1>
        <p class="text-[10px] font-semibold text-slate-500">Your financial breakdown</p>
    </nav>

    <main class="max-w-md mx-auto px-4 pt-6 space-y-6 page-enter">
        <div class="premium-card rounded-[2rem] p-6">
            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">Expenses by Category</h3>
            <div class="relative w-full h-64"><canvas id="expenseChart"></canvas></div>
        </div>

        <div class="premium-card rounded-[2rem] p-6">
            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">Income vs Expense</h3>
            <div class="relative w-full h-56"><canvas id="cashflowChart"></canvas></div>
        </div>
    </main>

    <!-- Floating Pill Navigation -->
    <div class="fixed bottom-6 inset-x-0 z-40 flex justify-center px-6 pointer-events-none">
        <nav class="w-full max-w-md bg-white/90 backdrop-blur-xl border border-slate-200 shadow-[0_20px_40px_-10px_rgba(0,0,0,0.1)] rounded-[2rem] px-6 py-4 flex items-center justify-between pointer-events-auto">
            <a href="dashboard.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600"><iconify-icon icon="solar:home-smile-angle-linear" class="text-xl"></iconify-icon></a>
            <a href="history.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600"><iconify-icon icon="solar:document-text-linear" class="text-xl"></iconify-icon></a>
            <a href="analytics.html" class="flex flex-col items-center gap-1 text-emerald-600"><iconify-icon icon="solar:chart-square-bold" class="text-xl"></iconify-icon></a>
            <a href="settings.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600"><iconify-icon icon="solar:settings-linear" class="text-xl"></iconify-icon></a>
        </nav>
    </div>

    <script src="js/config.js"></script>
    <script>
        if (!localStorage.getItem('token')) window.location.href = 'login.html';
        
        Chart.defaults.color = '#64748b'; // Slate-500 for light mode
        Chart.defaults.font.family = "'Plus Jakarta Sans', sans-serif";

        async function loadAnalytics() {
            try {
                const res = await fetch(`${API_BASE_URL}/transactions`, { headers: getAuthHeaders() });
                if (!res.ok) throw new Error(); const txData = await res.json();
                
                let categories = {}; let totalInc = 0, totalExp = 0;
                txData.forEach(tx => {
                    const amt = parseFloat(tx.amount);
                    if (tx.type === 'Expense') { totalExp += amt; categories[tx.category] = (categories[tx.category] || 0) + amt; } 
                    else if (tx.type === 'Income') { totalInc += amt; }
                });

                new Chart(document.getElementById('expenseChart'), {
                    type: 'doughnut',
                    data: { labels: Object.keys(categories), datasets: [{ data: Object.values(categories), backgroundColor: ['#0f172a', '#10b981', '#3b82f6', '#f59e0b', '#ec4899', '#8b5cf6'], borderWidth: 0, hoverOffset: 4 }] },
                    options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: {size: 10} } } } }
                });

                new Chart(document.getElementById('cashflowChart'), {
                    type: 'bar',
                    data: { labels: ['Cashflow'], datasets: [ { label: 'Income', data: [totalInc], backgroundColor: '#10b981', borderRadius: 8 }, { label: 'Expense', data: [totalExp], backgroundColor: '#0f172a', borderRadius: 8 } ] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(0,0,0,0.05)' } } } }
                });
            } catch (err) { alert('Failed to load analytics.'); }
        }
        window.onload = loadAnalytics;
    </script>
</body>
</html>
