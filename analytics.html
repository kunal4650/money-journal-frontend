<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Money Journal - Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f8fafc; }
        .premium-blur { backdrop-filter: blur(20px); background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255, 255, 255, 0.06); }
        .premium-card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.5) 0%, rgba(15, 23, 42, 0.8) 100%); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="pb-28 antialiased min-h-screen">

    <nav class="sticky top-0 z-40 premium-blur px-6 py-4 border-b border-white/5">
        <h1 class="text-lg font-extrabold tracking-tight text-white">Analytics</h1>
        <p class="text-[10px] font-semibold text-slate-400">Your financial breakdown</p>
    </nav>

    <main class="max-w-md mx-auto px-4 pt-6 space-y-6">
        <div class="premium-card rounded-[2rem] p-6 shadow-xl">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Expenses by Category</h3>
            <div class="relative w-full h-64">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>

        <div class="premium-card rounded-[2rem] p-6 shadow-xl">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Income vs Expense</h3>
            <div class="relative w-full h-56">
                <canvas id="cashflowChart"></canvas>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 inset-x-0 z-40 premium-blur border-t border-white/5 px-6 py-3 flex items-center justify-around max-w-md mx-auto rounded-t-3xl">
        <a href="dashboard.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-slate-300"><iconify-icon icon="solar:home-smile-angle-linear" class="text-xl"></iconify-icon><span class="text-[10px] font-bold">Home</span></a>
        <a href="history.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-slate-300"><iconify-icon icon="solar:document-text-linear" class="text-xl"></iconify-icon><span class="text-[10px] font-bold">History</span></a>
        <a href="analytics.html" class="flex flex-col items-center gap-1 text-blue-400"><iconify-icon icon="solar:chart-square-bold" class="text-xl"></iconify-icon><span class="text-[10px] font-bold">Analysis</span></a>
        <a href="settings.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-slate-300"><iconify-icon icon="solar:settings-linear" class="text-xl"></iconify-icon><span class="text-[10px] font-bold">Settings</span></a>
    </nav>

    <script src="js/config.js"></script>
    <script>
        if (!localStorage.getItem('token')) window.location.href = 'login.html';
        
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = "'Plus Jakarta Sans', sans-serif";

        async function loadAnalytics() {
            try {
                const res = await fetch(`${API_BASE_URL}/transactions`, { headers: getAuthHeaders() });
                if (!res.ok) throw new Error();
                const txData = await res.json();
                
                let categories = {};
                let totalInc = 0, totalExp = 0;

                txData.forEach(tx => {
                    const amt = parseFloat(tx.amount);
                    if (tx.type === 'Expense') {
                        totalExp += amt;
                        categories[tx.category] = (categories[tx.category] || 0) + amt;
                    } else if (tx.type === 'Income') {
                        totalInc += amt;
                    }
                });

                // Render Doughnut
                new Chart(document.getElementById('expenseChart'), {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(categories),
                        datasets: [{
                            data: Object.values(categories),
                            backgroundColor: ['#ef4444', '#f59e0b', '#3b82f6', '#8b5cf6', '#ec4899', '#14b8a6'],
                            borderWidth: 0, hoverOffset: 4
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: {size: 10} } } } }
                });

                // Render Bar Chart
                new Chart(document.getElementById('cashflowChart'), {
                    type: 'bar',
                    data: {
                        labels: ['Cashflow'],
                        datasets: [
                            { label: 'Income', data: [totalInc], backgroundColor: '#10b981', borderRadius: 8 },
                            { label: 'Expense', data: [totalExp], backgroundColor: '#f43f5e', borderRadius: 8 }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } } } }
                });

            } catch (err) { alert('Failed to load analytics.'); }
        }
        window.onload = loadAnalytics;
    </script>
</body>
</html>
