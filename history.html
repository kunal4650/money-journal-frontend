<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f8fafc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://api.iconify.design/solar/wallet-money-bold-duotone.svg?color=%2310b981&width=192&height=192">
    
    <title>Ledger - MyExpenseJournal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .glass-header { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.85); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .premium-card { background: #ffffff; border: 1px solid rgba(0, 0, 0, 0.04); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); }
        .page-enter { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input, select { -webkit-appearance: none; outline: none; }
    </style>
</head>
<body class="pb-32 antialiased min-h-screen">

    <nav class="sticky top-0 z-40 glass-header px-6 py-4">
        <h1 class="text-lg font-extrabold tracking-tight text-slate-900">Full Ledger</h1>
        <p class="text-[10px] font-semibold text-slate-500">Advanced search and analytics</p>
    </nav>

    <main class="max-w-md mx-auto px-4 pt-6 page-enter">
        
        <div class="bg-white border border-slate-200 rounded-[1.5rem] p-4 shadow-sm mb-4">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-[10px] font-bold text-slate-800 uppercase tracking-widest flex items-center gap-1.5"><iconify-icon icon="solar:filter-bold-duotone" class="text-emerald-500 text-sm"></iconify-icon> Smart Filters</h3>
                <button onclick="resetFilters()" class="text-[10px] font-bold text-emerald-600 hover:text-emerald-800 transition-colors">Reset All</button>
            </div>

            <div class="space-y-2.5">
                <div class="relative w-full">
                    <iconify-icon icon="solar:magnifer-linear" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></iconify-icon>
                    <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Search notes..." class="w-full pl-9 pr-3 py-2.5 bg-slate-50 border border-slate-100 rounded-xl text-xs font-semibold text-slate-800 focus:border-emerald-500 transition-colors">
                </div>

                <div class="grid grid-cols-2 gap-2.5">
                    <div class="relative flex-1">
                        <input type="date" id="filterDate" onchange="filterData()" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold text-slate-800 focus:border-emerald-500 transition-colors">
                    </div>

                    <div class="relative flex-1">
                        <select id="filterMonth" onchange="filterData()" class="w-full pl-3 pr-7 py-2.5 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold text-slate-800 focus:border-emerald-500 transition-colors cursor-pointer">
                            <option value="All">All Months</option>
                        </select>
                        <iconify-icon icon="solar:alt-arrow-down-linear" class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-sm"></iconify-icon>
                    </div>

                    <div class="relative flex-1">
                        <select id="filterCategory" onchange="filterData()" class="w-full pl-3 pr-7 py-2.5 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold text-slate-800 focus:border-emerald-500 transition-colors cursor-pointer">
                            <option value="All">All Categories</option>
                        </select>
                        <iconify-icon icon="solar:alt-arrow-down-linear" class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-sm"></iconify-icon>
                    </div>

                    <div class="relative flex-1">
                        <select id="filterLocation" onchange="filterData()" class="w-full pl-3 pr-7 py-2.5 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold text-slate-800 focus:border-emerald-500 transition-colors cursor-pointer">
                            <option value="All">All Locations</option>
                        </select>
                        <iconify-icon icon="solar:alt-arrow-down-linear" class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-sm"></iconify-icon>
                    </div>
                </div>
            </div>
        </div>

        <div id="filterSummary" class="hidden bg-slate-50 border border-slate-200 rounded-[1.5rem] p-4 mt-2 mb-4 flex items-center justify-between shadow-sm">
            <div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Filtered Income</p><p id="sumInc" class="text-sm font-black text-emerald-600">₹0</p></div>
            <div class="text-right"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Filtered Expense</p><p id="sumExp" class="text-sm font-black text-rose-500">₹0</p></div>
        </div>

        <div id="fullTransactionContainer" class="space-y-3">
            <div class="text-center py-12 text-slate-400 text-sm">
                <iconify-icon icon="solar:spinner-linear" class="animate-spin text-3xl block mx-auto mb-2"></iconify-icon>Loading records...
            </div>
        </div>
    </main>

    <div class="fixed bottom-6 inset-x-0 z-40 flex justify-center px-6 pointer-events-none">
        <nav class="w-full max-w-md bg-white/90 backdrop-blur-xl border border-slate-200 shadow-[0_20px_40px_-10px_rgba(0,0,0,0.1)] rounded-[2rem] px-6 py-4 flex items-center justify-between pointer-events-auto">
            <a href="dashboard.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600"><iconify-icon icon="solar:home-smile-angle-linear" class="text-xl"></iconify-icon></a>
            <a href="history.html" class="flex flex-col items-center gap-1 text-emerald-600"><iconify-icon icon="solar:document-text-bold" class="text-xl"></iconify-icon></a>
            <a href="analytics.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600"><iconify-icon icon="solar:chart-square-linear" class="text-xl"></iconify-icon></a>
            <a href="settings.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600"><iconify-icon icon="solar:settings-linear" class="text-xl"></iconify-icon></a>
        </nav>
    </div>

    <script src="js/config.js"></script>
    <script>
        if (!localStorage.getItem('token')) window.location.href = 'login.html';
        let allTx = [];

        async function loadHistory() {
            try {
                const res = await fetch(`${API_BASE_URL}/transactions?t=${Date.now()}`, { headers: getAuthHeaders(), cache: 'no-store' });
                if (!res.ok) throw new Error();
                
                let rawData = await res.json();
                allTx = rawData.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                populateSmartFilters();
                renderHistory(allTx, false);
            } catch (err) { alert('Failed to load history.'); }
        }

        function populateSmartFilters() {
            const uniqueMonths = {};
            const uniqueCats = new Set();
            const uniqueLocs = new Set();
            
            allTx.forEach(tx => {
                // Populate Months
                const dateObj = new Date(tx.date);
                const key = `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}`;
                const label = dateObj.toLocaleDateString('en-IN', { month: 'short', year: 'numeric' });
                uniqueMonths[key] = label;
                
                // Populate Categories
                if (tx.category) uniqueCats.add(tx.category);
                
                // Populate Locations
                if (tx.location) uniqueLocs.add(tx.location);
            });

            // Set Month Dropdown
            const sortedMonthKeys = Object.keys(uniqueMonths).sort((a, b) => b.localeCompare(a));
            let monthHtml = '<option value="All">All Months</option>';
            sortedMonthKeys.forEach(k => { monthHtml += `<option value="${k}">${uniqueMonths[k]}</option>`; });
            document.getElementById('filterMonth').innerHTML = monthHtml;

            // Set Category Dropdown
            let catHtml = '<option value="All">All Categories</option>';
            Array.from(uniqueCats).sort().forEach(c => { catHtml += `<option value="${c}">${c}</option>`; });
            document.getElementById('filterCategory').innerHTML = catHtml;

            // Set Location Dropdown
            let locHtml = '<option value="All">All Locations</option>';
            Array.from(uniqueLocs).sort().forEach(l => { locHtml += `<option value="${l}">${l}</option>`; });
            document.getElementById('filterLocation').innerHTML = locHtml;
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterDate').value = '';
            document.getElementById('filterMonth').value = 'All';
            document.getElementById('filterCategory').value = 'All';
            document.getElementById('filterLocation').value = 'All';
            filterData();
        }

        function filterData() {
            const query = document.getElementById('searchInput').value.toLowerCase(); 
            const exactDate = document.getElementById('filterDate').value; // YYYY-MM-DD
            const month = document.getElementById('filterMonth').value;
            const category = document.getElementById('filterCategory').value;
            const location = document.getElementById('filterLocation').value;

            const isFiltering = query !== '' || exactDate !== '' || month !== 'All' || category !== 'All' || location !== 'All';

            const filtered = allTx.filter(tx => {
                const txDateObj = new Date(tx.date);
                
                const matchesText = tx.notes ? tx.notes.toLowerCase().includes(query) : (query === '');
                const matchesCategory = category === 'All' || tx.category === category;
                const matchesLocation = location === 'All' || tx.location === location;
                
                const txMonthKey = `${txDateObj.getFullYear()}-${String(txDateObj.getMonth() + 1).padStart(2, '0')}`;
                const matchesMonth = month === 'All' || txMonthKey === month;
                
                const txExactDateStr = txDateObj.toISOString().split('T')[0];
                const matchesDate = exactDate === '' || txExactDateStr === exactDate;
                
                return matchesText && matchesCategory && matchesLocation && matchesMonth && matchesDate;
            });
            
            renderHistory(filtered, isFiltering);
        }

        function renderHistory(data, isFiltering) {
            const container = document.getElementById('fullTransactionContainer');
            const summaryBox = document.getElementById('filterSummary');
            
            if (isFiltering) {
                let sInc = 0, sExp = 0;
                data.forEach(tx => {
                    const amt = parseFloat(tx.amount);
                    if (tx.type === 'Income') sInc += amt;
                    if (tx.type === 'Expense') sExp += amt;
                });
                document.getElementById('sumInc').innerText = `₹${sInc.toLocaleString('en-IN')}`;
                document.getElementById('sumExp').innerText = `₹${sExp.toLocaleString('en-IN')}`;
                summaryBox.classList.remove('hidden');
            } else {
                summaryBox.classList.add('hidden');
            }

            if (data.length === 0) { 
                container.innerHTML = `<div class="text-center py-12 text-slate-400 text-sm"><div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4"><iconify-icon icon="solar:folder-error-bold-duotone" class="text-3xl text-slate-300"></iconify-icon></div>No records match your filters</div>`; 
                return; 
            }

            container.innerHTML = data.map(tx => {
                let color = 'text-slate-500', sign = '', icon = 'solar:refresh-linear', bg = 'bg-slate-100';
                if(tx.type === 'Income' || (tx.type === 'Transfer' && tx.amount > 0) || (tx.type === 'Balance Correction' && tx.amount > 0)) { color = 'text-emerald-600'; sign = '+'; icon = 'solar:arrow-left-down-bold'; bg = 'bg-emerald-50 text-emerald-600'; } 
                else if (tx.type === 'Expense' || (tx.type === 'Transfer' && tx.amount < 0) || (tx.type === 'Balance Correction' && tx.amount < 0)) { color = 'text-slate-900'; sign = ''; icon = 'solar:arrow-right-up-bold'; bg = 'bg-rose-50 text-rose-500'; }
                
                const dateObj = new Date(tx.date).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });

                return `<div class="premium-card rounded-2xl p-4 flex items-center justify-between hover:bg-slate-50 transition-colors">
                        <div class="flex items-center gap-3"><div class="w-10 h-10 rounded-xl flex items-center justify-center ${bg}"><iconify-icon icon="${icon}" class="text-lg"></iconify-icon></div>
                        <div>
                            <p class="text-sm font-bold text-slate-800">${tx.category}</p>
                            <p class="text-[10px] font-semibold text-slate-500">${dateObj} &bull; ${tx.wallet}</p>
                            ${tx.location ? `<p class="text-[9px] font-bold text-blue-500 flex items-center gap-0.5 mt-0.5"><iconify-icon icon="solar:map-point-linear"></iconify-icon> ${tx.location}</p>` : ''}
                        </div></div>
                        <div class="text-right"><p class="text-sm font-black ${color}">${sign}₹${parseFloat(Math.abs(tx.amount)).toLocaleString('en-IN')}</p>
                        ${tx.notes ? `<p class="text-[9px] text-slate-400 max-w-[100px] truncate">${tx.notes}</p>` : ''}</div></div>`;
            }).join('');
        }
        
        window.onload = loadHistory;
    </script>
</body>
</html>
