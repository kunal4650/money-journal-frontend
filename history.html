<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Money Journal - Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f8fafc; }
        .premium-blur { backdrop-filter: blur(20px); background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255, 255, 255, 0.06); }
        .premium-card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.5) 0%, rgba(15, 23, 42, 0.8) 100%); border: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        input, select { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="pb-28 antialiased min-h-screen">

    <nav class="sticky top-0 z-40 premium-blur px-6 py-4 border-b border-white/5">
        <h1 class="text-lg font-extrabold tracking-tight text-white">Full Ledger</h1>
        <p class="text-[10px] font-semibold text-slate-400">Search and filter all records</p>
    </nav>

    <main class="max-w-md mx-auto px-4 pt-6 space-y-4">
        <div class="flex gap-2">
            <div class="relative flex-1">
                <iconify-icon icon="solar:magnifer-linear" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></iconify-icon>
                <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Search notes or category..." class="w-full pl-10 pr-4 py-3.5 bg-white/5 border border-white/10 rounded-xl outline-none text-sm text-white focus:border-blue-500">
            </div>
            <select id="filterType" onchange="filterData()" class="px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl outline-none text-sm font-bold text-white focus:border-blue-500">
                <option value="All" class="bg-slate-900">All</option>
                <option value="Income" class="bg-slate-900">Income</option>
                <option value="Expense" class="bg-slate-900">Expense</option>
            </select>
        </div>

        <div id="fullTransactionContainer" class="space-y-2.5 mt-4">
            <div class="text-center py-8 text-slate-500 text-sm">
                <iconify-icon icon="solar:spinner-linear" class="animate-spin text-3xl block mx-auto mb-2"></iconify-icon>Loading records...
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 inset-x-0 z-40 premium-blur border-t border-white/5 px-6 py-3 flex items-center justify-around max-w-md mx-auto rounded-t-3xl">
        <a href="dashboard.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-slate-300 transition-colors"><iconify-icon icon="solar:home-smile-angle-linear" class="text-xl"></iconify-icon><span class="text-[10px] font-bold">Home</span></a>
        <a href="history.html" class="flex flex-col items-center gap-1 text-blue-400"><iconify-icon icon="solar:document-text-bold" class="text-xl"></iconify-icon><span class="text-[10px] font-bold">History</span></a>
        <a href="analytics.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-slate-300 transition-colors"><iconify-icon icon="solar:chart-square-linear" class="text-xl"></iconify-icon><span class="text-[10px] font-bold">Analysis</span></a>
        <a href="settings.html" class="flex flex-col items-center gap-1 text-slate-500 hover:text-slate-300 transition-colors"><iconify-icon icon="solar:settings-linear" class="text-xl"></iconify-icon><span class="text-[10px] font-bold">Settings</span></a>
    </nav>

    <script src="js/config.js"></script>
    <script>
        if (!localStorage.getItem('token')) window.location.href = 'login.html';
        let allTx = [];

        async function loadHistory() {
            try {
                const res = await fetch(`${API_BASE_URL}/transactions`, { headers: getAuthHeaders() });
                if (!res.ok) throw new Error();
                allTx = await res.json();
                renderHistory(allTx);
            } catch (err) { alert('Failed to load history.'); }
        }

        function filterData() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const type = document.getElementById('filterType').value;
            
            const filtered = allTx.filter(tx => {
                const matchesText = tx.category.toLowerCase().includes(query) || (tx.notes && tx.notes.toLowerCase().includes(query));
                const matchesType = type === 'All' || tx.type === type;
                return matchesText && matchesType;
            });
            renderHistory(filtered);
        }

        function renderHistory(data) {
            const container = document.getElementById('fullTransactionContainer');
            if (data.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-slate-500 text-sm"><iconify-icon icon="solar:ghost-smile-broken" class="text-3xl block mx-auto mb-2 opacity-50"></iconify-icon>No records found</div>`;
                return;
            }

            container.innerHTML = data.map(tx => {
                let color = 'text-slate-400', sign = '', icon = 'solar:refresh-linear', border = 'border-l-slate-500';
                if(tx.type === 'Income' || (tx.type === 'Transfer' && tx.amount > 0) || (tx.type === 'Balance Correction' && tx.amount > 0)) {
                    color = 'text-emerald-400'; sign = '+'; icon = 'solar:arrow-left-down-bold'; border = 'border-l-emerald-500';
                } else if (tx.type === 'Expense' || (tx.type === 'Transfer' && tx.amount < 0) || (tx.type === 'Balance Correction' && tx.amount < 0)) {
                    color = 'text-rose-400'; sign = ''; icon = 'solar:arrow-right-up-bold'; border = 'border-l-rose-500';
                }
                const dateObj = new Date(tx.date).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });

                return `
                    <div class="premium-card rounded-2xl p-4 flex items-center justify-between border-l-4 ${border}">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 rounded-xl flex items-center justify-center bg-white/5 text-slate-300">
                                <iconify-icon icon="${icon}" class="text-lg"></iconify-icon>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-slate-100">${tx.category}</p>
                                <p class="text-[10px] font-semibold text-slate-400">${dateObj} &bull; ${tx.wallet}</p>
                            </div>
                        </div>
                        <p class="text-sm font-black ${color}">${sign}\u20B9${parseFloat(Math.abs(tx.amount)).toLocaleString('en-IN')}</p>
                    </div>`;
            }).join('');
        }

        window.onload = loadHistory;
    </script>
</body>
</html>
