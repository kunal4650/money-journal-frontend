<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Money Journal - Join</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f8fafc; }
        .bg-grid { background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 30px 30px; }
        .premium-blur { backdrop-filter: blur(20px); background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
        input, select { -webkit-appearance: none; }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-4 relative overflow-x-hidden">
    <div class="fixed inset-0 bg-grid pointer-events-none z-[-1]"></div>
    <div class="absolute top-[-10%] left-[-10%] w-72 h-72 bg-blue-600/30 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-72 h-72 bg-emerald-600/20 rounded-full blur-[100px] pointer-events-none"></div>
    
    <div class="w-full max-w-md premium-blur rounded-[2.5rem] p-8 shadow-2xl relative z-10 my-8">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black tracking-tight text-white mb-1">Create Account</h1>
            <p class="text-xs font-semibold text-slate-400">Master your personal finances</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Full Name</label>
                <input type="text" id="name" required class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl outline-none font-bold text-white focus:border-blue-500 transition-colors">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Email</label>
                <input type="email" id="email" required class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl outline-none font-bold text-white focus:border-blue-500 transition-colors">
            </div>
            <div class="relative">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl outline-none font-bold text-white focus:border-blue-500 transition-colors pr-12">
                <button type="button" onclick="togglePwd('password', 'eyeIcon1')" class="absolute right-4 bottom-3 text-slate-400 hover:text-white">
                    <iconify-icon id="eyeIcon1" icon="solar:eye-linear" class="text-xl"></iconify-icon>
                </button>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Security Question (For Password Reset)</label>
                <select id="securityQuestion" required class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl outline-none font-bold text-white focus:border-blue-500 transition-colors text-sm">
                    <option value="What was your childhood nickname?" class="bg-slate-900">What was your childhood nickname?</option>
                    <option value="What is the name of your first pet?" class="bg-slate-900">What is the name of your first pet?</option>
                    <option value="What city were you born in?" class="bg-slate-900">What city were you born in?</option>
                </select>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Security Answer</label>
                <input type="text" id="securityAnswer" required placeholder="Keep this safe!" class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl outline-none font-bold text-white focus:border-blue-500 transition-colors">
            </div>

            <button type="submit" id="submitBtn" class="w-full py-4 mt-2 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-500 transition-all active:scale-95 flex justify-center items-center gap-2">
                Sign Up <iconify-icon icon="solar:alt-arrow-right-linear" class="text-lg"></iconify-icon>
            </button>
        </form>
        <div class="text-center mt-6">
            <p class="text-xs font-semibold text-slate-400">Already have an account? <a href="login.html" class="text-blue-400 font-bold">Log In</a></p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        function togglePwd(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text"; icon.setAttribute("icon", "solar:eye-closed-linear");
            } else {
                input.type = "password"; icon.setAttribute("icon", "solar:eye-linear");
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<iconify-icon icon="solar:spinner-linear" class="animate-spin text-xl"></iconify-icon>';
            
            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                securityQuestion: document.getElementById('securityQuestion').value,
                securityAnswer: document.getElementById('securityAnswer').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token); window.location.href = 'dashboard.html';
                } else {
                    alert(data.msg); btn.innerHTML = 'Sign Up <iconify-icon icon="solar:alt-arrow-right-linear"></iconify-icon>';
                }
            } catch (err) {
                alert('Connection error.'); btn.innerHTML = 'Sign Up';
            }
        });
    </script>
</body>
</html>
