<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Register - MyExpenseJournal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        /* Fixes Safari/Tailwind stripping the inputs */
        input[type="text"], input[type="email"], input[type="password"], select { -webkit-appearance: none; }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-4 relative overflow-x-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-72 h-72 bg-emerald-400/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-72 h-72 bg-blue-400/20 rounded-full blur-[100px] pointer-events-none"></div>
    
    <div class="w-full max-w-md bg-white border border-slate-100 rounded-[2.5rem] p-8 shadow-2xl relative z-10 my-8">
        <div class="text-center mb-6">
            <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center mx-auto mb-4"><iconify-icon icon="solar:wallet-money-bold-duotone" class="text-2xl"></iconify-icon></div>
            <h1 class="text-2xl font-black tracking-tight text-slate-900 mb-1">Create Account</h1>
            <p class="text-xs font-semibold text-slate-500">Secure your financial future</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Full Name</label>
                <input type="text" id="name" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold text-slate-800 focus:border-emerald-500 focus:bg-white transition-colors">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Email</label>
                <input type="email" id="email" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold text-slate-800 focus:border-emerald-500 focus:bg-white transition-colors">
            </div>
            <div class="relative">
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold text-slate-800 focus:border-emerald-500 focus:bg-white transition-colors pr-12">
                <button type="button" onclick="togglePwd('password', 'eyeIcon1')" class="absolute right-4 bottom-3 text-slate-400 hover:text-slate-600">
                    <iconify-icon id="eyeIcon1" icon="solar:eye-linear" class="text-xl"></iconify-icon>
                </button>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Security Question (For Password Reset)</label>
                <select id="securityQuestion" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold text-slate-800 focus:border-emerald-500 focus:bg-white transition-colors text-sm">
                    <option value="What was your childhood nickname?">What was your childhood nickname?</option>
                    <option value="What is the name of your first pet?">What is the name of your first pet?</option>
                    <option value="What city were you born in?">What city were you born in?</option>
                </select>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Security Answer</label>
                <input type="text" id="securityAnswer" required placeholder="Keep this safe!" class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold text-slate-800 focus:border-emerald-500 focus:bg-white transition-colors">
            </div>

            <!-- FIXED LEGAL CHECKBOX (Large, Clickable, Styled) -->
            <label class="flex items-start gap-3 p-3 mt-2 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-100 transition-colors">
                <input type="checkbox" id="terms" required class="mt-0.5 w-5 h-5 accent-emerald-600 cursor-pointer flex-shrink-0">
                <span class="text-xs text-slate-600 font-medium leading-relaxed select-none">
                    I agree to the <a href="terms.html" class="text-emerald-600 font-bold hover:underline" onclick="event.stopPropagation()">Terms & Conditions</a> and <a href="privacy.html" class="text-emerald-600 font-bold hover:underline" onclick="event.stopPropagation()">Privacy Policy</a>.
                </span>
            </label>

            <button type="submit" id="submitBtn" class="w-full py-4 mt-2 bg-emerald-600 text-white font-bold rounded-xl shadow-lg shadow-emerald-500/30 hover:bg-emerald-500 transition-all active:scale-95 flex justify-center items-center gap-2">
                Create Account <iconify-icon icon="solar:alt-arrow-right-linear" class="text-lg"></iconify-icon>
            </button>
        </form>
        <div class="text-center mt-6">
            <p class="text-xs font-semibold text-slate-500">Already have an account? <a href="login.html" class="text-emerald-600 font-bold hover:underline">Log In</a></p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        function togglePwd(inputId, iconId) {
            const input = document.getElementById(inputId); const icon = document.getElementById(iconId);
            if (input.type === "password") { input.type = "text"; icon.setAttribute("icon", "solar:eye-closed-linear"); } 
            else { input.type = "password"; icon.setAttribute("icon", "solar:eye-linear"); }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.innerHTML = '<iconify-icon icon="solar:spinner-linear" class="animate-spin text-xl"></iconify-icon>';
            
            const payload = {
                name: document.getElementById('name').value, email: document.getElementById('email').value,
                password: document.getElementById('password').value, securityQuestion: document.getElementById('securityQuestion').value,
                securityAnswer: document.getElementById('securityAnswer').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await response.json();
                if (response.ok) { localStorage.setItem('token', data.token); window.location.href = 'dashboard.html'; } 
                else { alert(data.msg); btn.innerHTML = 'Create Account <iconify-icon icon="solar:alt-arrow-right-linear"></iconify-icon>'; }
            } catch (err) { alert('Connection error.'); btn.innerHTML = 'Create Account'; }
        });
    </script>
</body>
</html>
