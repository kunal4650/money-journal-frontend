<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Money Journal - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f8fafc; }
        .premium-blur { backdrop-filter: blur(20px); background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255, 255, 255, 0.06); }
        .premium-card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.5) 0%, rgba(15, 23, 42, 0.8) 100%); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .premium-card:hover { transform: translateY(-4px); border-color: rgba(59, 130, 246, 0.3); box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.5); }
        .modal-animate { transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); transform: scale(0.9) translateY(20px); opacity: 0; }
        .modal-active .modal-animate { transform: scale(1) translateY(0); opacity: 1; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        input, select, button { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="pb-28 antialiased min-h-screen">

    <!-- Top Sticky Navigation Bar -->
    <nav class="sticky top-0 z-40 premium-blur px-6 py-4 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="h-10 w-10 rounded-xl bg-blue-600/20 border border-blue-500/30 flex items-center justify-center shadow-lg shadow-blue-500/10">
                <iconify-icon icon="solar:wallet-money-bold-duotone" class="text-blue-400 text-2xl"></iconify-icon>
            </div>
            <div>
                <h1 class="text-base font-extrabold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">Money Journal</h1>
                <p class="text-[10px] font-semibold text-emerald-400 mt-0.5 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span> Connected</p>
            </div>
        </div>
        <button onclick="logout()" class="h-9 w-9 rounded-xl hover:bg-white/5 flex items-center justify-center transition-colors text-slate-400 hover:text-rose-400">
            <iconify-icon icon="solar:logout-3-broken" class="text-xl"></iconify-icon>
        </button>
    </nav>

    <main class="max-w-md mx-auto px-4 pt-6 space-y-6">

        <!-- Master Balance Card -->
        <div class="w-full rounded-[2.5rem] bg-gradient-to-br from-blue-600 to-indigo-700 p-6 shadow-xl relative overflow-hidden group">
            <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/5 rounded-full blur-2xl pointer-events-none group-hover:scale-125 transition-transform duration-700"></div>
            <p class="text-xs font-bold text-white/70 uppercase tracking-widest">Total Net Balance</p>
            <h2 id="totalBalance" class="text-3xl font-black text-white tracking-tight mt-1 transition-all duration-300">₹0.00</h2>
            
            <div class="grid grid-cols-2 gap-4 mt-6 pt-6 border-t border-white/10">
                <div class="flex items-center gap-2.5">
                    <div class="w-8 h-8 rounded-lg bg-emerald-500/20 flex items-center justify-center text-emerald-300">
                        <iconify-icon icon="solar:arrow-left-down-bold" class="text-base"></iconify-icon>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-white/60 uppercase">Money In</p>
                        <p id="totalIn" class="text-sm font-bold text-emerald-300">₹0.00</p>
                    </div>
                </div>
                <div class="flex items-center gap-2.5">
                    <div class="w-8 h-8 rounded-lg bg-rose-500/20 flex items-center justify-center text-rose-300">
                        <iconify-icon icon="solar:arrow-right-up-bold" class="text-base"></iconify-icon>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-white/60 uppercase">Money Out</p>
                        <p id="totalOut" class="text-sm font-bold text-rose-300">₹0.00</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Wallets Horizon -->
        <div>
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 px-1">Wallets & Accounts</h3>
            <div class="grid grid-cols-2 gap-3">
                <div class="premium-card rounded-2xl p-4 flex items-center gap-3">
                    <div class="w-9 h-9 rounded-xl bg-amber-500/10 flex items-center justify-center text-amber-400"><iconify-icon icon="solar:banknote-linear" class="text-xl"></iconify-icon></div>
                    <div><p class="text-[11px] font-semibold text-slate-400">Cash</p><p id="walletCash" class="text-sm font-bold text-slate-200">₹0.00</p></div>
                </div>
                <div class="premium-card rounded-2xl p-4 flex items-center gap-3">
                    <div class="w-9 h-9 rounded-xl bg-purple-500/10 flex items-center justify-center text-purple-400"><iconify-icon icon="solar:qr-code-linear" class="text-xl"></iconify-icon></div>
                    <div><p class="text-[11px] font-semibold text-slate-400">UPI / Digital</p><p id="walletUPI" class="text-sm font-bold text-slate-200">₹0.00</p></div>
                </div>
                <div class="premium-card rounded-2xl p-4 flex items-center gap-3">
                    <div class="w-9 h-9 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-400"><iconify-icon icon="solar:bank-linear" class="text-xl"></iconify-icon></div>
                    <div><p class="text-[11px] font-semibold text-slate-400">Bank Account</p><p id="walletBank" class="text-sm font-bold text-slate-200">₹0.00</p></div>
                </div>
                <div class="premium-card rounded-2xl p-4 flex items-center gap-3">
                    <div class="w-9 h-9 rounded-xl bg-rose-500/10 flex items-center justify-center text-rose-400"><iconify-icon icon="solar:card-transfer-linear" class="text-xl"></iconify-icon></div>
                    <div><p class="text-[11px] font-semibold text-slate-400">Cards</p><p id="walletCard" class="text-sm font-bold text-slate-200">₹0.00</p></div>
                </div>
            </div>
        </div>

        <!-- Recent Ledger Activity Section -->
        <div>
            <div class="flex justify-between items-center mb-3 px-1">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Recent Activity</h3>
            </div>
            <div id="transactionContainer" class="space-y-2.5 max-h-[350px] overflow-y-auto custom-scroll pr-1">
                <!-- Fallback Loading UI -->
                <div class="text-center py-8 text-slate-500 font-medium text-sm">
                    <iconify-icon icon="solar:spinner-linear" class="animate-spin text-3xl mb-1 block mx-auto opacity-50"></iconify-icon>
                    Syncing data...
                </div>
            </div>
        </div>

    </main>

    <!-- Floating Action Button (+) -->
    <button onclick="toggleModal(true)" class="fixed bottom-24 right-6 z-50 h-14 w-14 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl shadow-xl shadow-blue-500/20 flex items-center justify-center transform active:scale-95 transition-all">
        <iconify-icon icon="solar:add-circle-bold" class="text-2xl"></iconify-icon>
    </button>

    <!-- Fixed Bottom Navigation -->
    <nav class="fixed bottom-0 inset-x-0 z-40 premium-blur border-t border-white/5 px-6 py-3 flex items-center justify-around max-w-md mx-auto rounded-t-3xl">
        <a href="dashboard.html" class="flex flex-col items-center gap-1 text-blue-400">
            <iconify-icon icon="solar:home-smile-angle-bold" class="text-xl"></iconify-icon>
            <span class="text-[10px] font-bold">Home</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-slate-500 opacity-50 cursor-not-allowed">
            <iconify-icon icon="solar:document-text-linear" class="text-xl"></iconify-icon>
            <span class="text-[10px] font-bold">History</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-slate-500 opacity-50 cursor-not-allowed">
            <iconify-icon icon="solar:chart-square-linear" class="text-xl"></iconify-icon>
            <span class="text-[10px] font-bold">Analysis</span>
        </a>
    </nav>

    <!-- Add Transaction Modal -->
    <div id="txModal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-50 flex items-end justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="w-full max-w-md bg-slate-900 border-t border-white/10 rounded-t-[2.5rem] p-6 modal-animate shadow-2xl relative">
            <div class="w-12 h-1 bg-white/20 rounded-full mx-auto mb-6" onclick="toggleModal(false)"></div>
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-extrabold tracking-tight text-white">Log Transaction</h2>
                <button onclick="toggleModal(false)" class="h-8 w-8 rounded-full bg-white/5 flex items-center justify-center text-slate-400 hover:text-white"><iconify-icon icon="solar:close-circle-linear" class="text-lg"></iconify-icon></button>
            </div>

            <form id="transactionForm" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Amount (INR)</label>
                    <input type="number" step="any" id="txAmount" required placeholder="0.00" class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl outline-none font-bold text-white focus:border-blue-500 transition-colors">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Flow Type</label>
                    <select id="txType" required class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl outline-none font-bold text-white focus:border-blue-500 transition-colors">
                        <option value="Money Out" class="bg-slate-900 text-rose-400 font-bold">Money Out</option>
                        <option value="Money In" class="bg-slate-900 text-emerald-400 font-bold">Money In</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Category</label>
                    <input type="text" id="txCategory" required placeholder="e.g., Food, Salary, Rent" class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl outline-none font-semibold text-white focus:border-blue-500 transition-colors">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Wallet / Mode</label>
                    <select id="txWallet" class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl outline-none font-semibold text-white focus:border-blue-500 transition-colors">
                        <option value="Cash" class="bg-slate-900">Cash</option>
                        <option value="UPI" class="bg-slate-900">UPI / Digital</option>
                        <option value="Bank Account" class="bg-slate-900">Bank Account</option>
                        <option value="Credit Card" class="bg-slate-900">Cards</option>
                    </select>
                </div>

                <button type="submit" id="saveTxBtn" class="w-full py-4 mt-2 bg-blue-600 text-white font-bold rounded-xl shadow-lg transform active:scale-95 flex items-center justify-center gap-2">
                    Save Transaction <iconify-icon icon="solar:check-circle-linear" class="text-lg"></iconify-icon>
                </button>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        if (!localStorage.getItem('token')) window.location.href = 'login.html';

        function toggleModal(open) {
            const container = document.getElementById('txModal');
            if (open) {
                container.classList.remove('pointer-events-none', 'opacity-0');
                container.classList.add('modal-active', 'opacity-100');
            } else {
                container.classList.remove('modal-active', 'opacity-100');
                container.classList.add('pointer-events-none', 'opacity-0');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        async function fetchDashboardMetrics() {
            try {
                const response = await fetch(`${API_BASE_URL}/transactions`, {
                    method: 'GET', headers: getAuthHeaders()
                });

                if (!response.ok) throw new Error('Auth failed');
                const txList = await response.json();

                let netBalance = 0, moneyInTotal = 0, moneyOutTotal = 0;
                let balances = { Cash: 0, UPI: 0, "Bank Account": 0, "Credit Card": 0 };

                txList.forEach(tx => {
                    const amt = parseFloat(tx.amount);
                    if (tx.type === 'Money In') {
                        moneyInTotal += amt; netBalance += amt;
                        if(balances[tx.wallet] !== undefined) balances[tx.wallet] += amt;
                    } else if (tx.type === 'Money Out') {
                        moneyOutTotal += amt; netBalance -= amt;
                        if(balances[tx.wallet] !== undefined) balances[tx.wallet] -= amt;
                    }
                });

                document.getElementById('totalBalance').innerText = `\u20B9${netBalance.toLocaleString('en-IN')}`;
                document.getElementById('totalIn').innerText = `\u20B9${moneyInTotal.toLocaleString('en-IN')}`;
                document.getElementById('totalOut').innerText = `\u20B9${moneyOutTotal.toLocaleString('en-IN')}`;
                document.getElementById('walletCash').innerText = `\u20B9${balances.Cash.toLocaleString('en-IN')}`;
                document.getElementById('walletUPI').innerText = `\u20B9${balances.UPI.toLocaleString('en-IN')}`;
                document.getElementById('walletBank').innerText = `\u20B9${balances["Bank Account"].toLocaleString('en-IN')}`;
                document.getElementById('walletCard').innerText = `\u20B9${balances["Credit Card"].toLocaleString('en-IN')}`;

                renderLedgerFeed(txList.slice(0, 10));
            } catch (err) {
                logout();
            }
        }

        function renderLedgerFeed(transactions) {
            const container = document.getElementById('transactionContainer');
            if (transactions.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-slate-500 font-medium text-sm"><iconify-icon icon="solar:box-minimalistic-broken" class="text-3xl mb-1 block mx-auto opacity-50"></iconify-icon>No transactions yet</div>`;
                return;
            }

            container.innerHTML = transactions.map(tx => {
                const isMoneyIn = tx.type === 'Money In';
                const colorClass = isMoneyIn ? 'text-emerald-400' : 'text-rose-400';
                const bgIcon = isMoneyIn ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/10' : 'bg-rose-500/10 text-rose-400 border-rose-500/10';
                const dateObj = new Date(tx.date).toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });

                return `
                    <div class="premium-card rounded-2xl p-4 flex items-center justify-between border-l-4 ${isMoneyIn ? 'border-l-emerald-500' : 'border-l-rose-500'}">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 rounded-xl flex items-center justify-center border ${bgIcon}">
                                <iconify-icon icon="${isMoneyIn ? 'solar:arrow-left-down-bold' : 'solar:arrow-right-up-bold'}" class="text-lg"></iconify-icon>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-slate-100">${tx.category}</p>
                                <p class="text-[10px] font-semibold text-slate-400">${dateObj} &bull; ${tx.wallet}</p>
                            </div>
                        </div>
                        <p class="text-sm font-black ${colorClass}">${isMoneyIn ? '+' : '-'}\u20B9${parseFloat(tx.amount).toLocaleString('en-IN')}</p>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('transactionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveTxBtn');
            btn.innerHTML = '<iconify-icon icon="solar:spinner-linear" class="animate-spin text-xl"></iconify-icon>';

            const tx = {
                amount: document.getElementById('txAmount').value,
                type: document.getElementById('txType').value,
                category: document.getElementById('txCategory').value,
                wallet: document.getElementById('txWallet').value
            };

            try {
                const res = await fetch(`${API_BASE_URL}/transactions`, {
                    method: 'POST', headers: getAuthHeaders(), body: JSON.stringify(tx)
                });
                if (res.ok) {
                    document.getElementById('transactionForm').reset();
                    toggleModal(false);
                    fetchDashboardMetrics();
                }
            } finally {
                btn.innerHTML = 'Save Transaction <iconify-icon icon="solar:check-circle-linear" class="text-lg"></iconify-icon>';
            }
        });

        window.onload = fetchDashboardMetrics;
    </script>
</body>
</html>
