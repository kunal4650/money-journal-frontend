<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Log In - MyExpenseJournal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        input { -webkit-appearance: none; }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    
    <!-- Floating Back to Home Button -->
    <a href="index.html" class="absolute top-6 left-6 z-50 flex items-center gap-2 text-sm font-bold text-slate-600 hover:text-slate-900 transition-colors bg-white/80 backdrop-blur-md px-4 py-2.5 rounded-full border border-slate-200 shadow-sm active:scale-95">
        <iconify-icon icon="solar:home-smile-angle-linear" class="text-lg"></iconify-icon> Home
    </a>

    <!-- Background Decor -->
    <div class="absolute top-[-10%] right-[-10%] w-72 h-72 bg-emerald-400/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-72 h-72 bg-blue-400/20 rounded-full blur-[100px] pointer-events-none"></div>
    
    <div class="w-full max-w-md bg-white border border-slate-100 rounded-[2.5rem] p-8 shadow-2xl relative z-10 my-16">
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-slate-50 text-slate-800 rounded-xl flex items-center justify-center mx-auto mb-4"><iconify-icon icon="solar:lock-keyhole-minimalistic-bold-duotone" class="text-2xl"></iconify-icon></div>
            <h1 class="text-2xl font-black tracking-tight text-slate-900 mb-1">Welcome Back</h1>
            <p class="text-xs font-semibold text-slate-500">Log in to your dashboard</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Email Address</label>
                <input type="email" id="email" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold text-slate-800 focus:border-emerald-500 focus:bg-white transition-colors">
            </div>
            <div class="relative">
                <div class="flex justify-between items-center mb-1.5">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest">Password</label>
                    <a href="forgot-password.html" class="text-[10px] font-bold text-emerald-600 hover:underline">Forgot?</a>
                </div>
                <input type="password" id="password" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold text-slate-800 focus:border-emerald-500 focus:bg-white transition-colors pr-12">
                <button type="button" onclick="togglePwd('password', 'eyeIcon2')" class="absolute right-4 bottom-3 text-slate-400 hover:text-slate-600">
                    <iconify-icon id="eyeIcon2" icon="solar:eye-linear" class="text-xl"></iconify-icon>
                </button>
            </div>

            <button type="submit" id="submitBtn" class="w-full py-4 mt-4 bg-slate-900 text-white font-bold rounded-xl shadow-lg hover:bg-slate-800 transition-all active:scale-95 flex justify-center items-center gap-2">
                Log In <iconify-icon icon="solar:login-2-linear" class="text-lg"></iconify-icon>
            </button>
        </form>
        <div class="text-center mt-6">
            <p class="text-xs font-semibold text-slate-500">New here? <a href="register.html" class="text-emerald-600 font-bold hover:underline">Create Account</a></p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        function togglePwd(inputId, iconId) {
            const input = document.getElementById(inputId); const icon = document.getElementById(iconId);
            if (input.type === "password") { input.type = "text"; icon.setAttribute("icon", "solar:eye-closed-linear"); } 
            else { input.type = "password"; icon.setAttribute("icon", "solar:eye-linear"); }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.innerHTML = '<iconify-icon icon="solar:spinner-linear" class="animate-spin text-xl"></iconify-icon>';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
                });
                const data = await response.json();
                
                if (response.ok) { localStorage.setItem('token', data.token); window.location.href = 'dashboard.html'; } 
                else { alert(data.msg); btn.innerHTML = 'Log In <iconify-icon icon="solar:login-2-linear"></iconify-icon>'; }
            } catch (err) { alert('Connection error.'); btn.innerHTML = 'Log In'; }
        });
    </script>
</body>
</html>
