<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Money Journal - Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f8fafc; }
        .bg-grid { background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 30px 30px; }
        .premium-blur { backdrop-filter: blur(20px); background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <div class="fixed inset-0 bg-grid pointer-events-none z-[-1]"></div>
    
    <div class="w-full max-w-md premium-blur rounded-[2.5rem] p-8 shadow-2xl relative z-10">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black tracking-tight text-white mb-1">Reset Password</h1>
            <p class="text-xs font-semibold text-slate-400">Answer your security question</p>
        </div>

        <form id="resetForm" class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Email Address</label>
                <input type="email" id="email" required class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl outline-none font-bold text-white focus:border-blue-500 transition-colors">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Your Secret Answer</label>
                <input type="text" id="answer" required class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl outline-none font-bold text-white focus:border-blue-500 transition-colors">
            </div>
            <div class="relative">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">New Password</label>
                <input type="password" id="newPassword" required class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl outline-none font-bold text-white focus:border-blue-500 transition-colors pr-12">
                <button type="button" onclick="togglePwd('newPassword', 'eyeIcon3')" class="absolute right-4 bottom-3 text-slate-400 hover:text-white">
                    <iconify-icon id="eyeIcon3" icon="solar:eye-linear" class="text-xl"></iconify-icon>
                </button>
            </div>

            <button type="submit" id="submitBtn" class="w-full py-4 mt-4 bg-emerald-600 text-white font-bold rounded-xl shadow-lg hover:bg-emerald-500 transition-all active:scale-95 flex justify-center items-center gap-2">
                Update Password <iconify-icon icon="solar:check-circle-linear" class="text-lg"></iconify-icon>
            </button>
        </form>
        <div class="text-center mt-6">
            <a href="login.html" class="text-xs font-bold text-blue-400 hover:text-blue-300 flex items-center justify-center gap-1"><iconify-icon icon="solar:arrow-left-linear"></iconify-icon> Back to Login</a>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        function togglePwd(inputId, iconId) {
            const input = document.getElementById(inputId); const icon = document.getElementById(iconId);
            if (input.type === "password") { input.type = "text"; icon.setAttribute("icon", "solar:eye-closed-linear"); } 
            else { input.type = "password"; icon.setAttribute("icon", "solar:eye-linear"); }
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<iconify-icon icon="solar:spinner-linear" class="animate-spin text-xl"></iconify-icon>';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value, securityAnswer: document.getElementById('answer').value, newPassword: document.getElementById('newPassword').value })
                });
                const data = await response.json();
                
                if (response.ok) {
                    alert('Success! You can now log in with your new password.');
                    window.location.href = 'login.html';
                } else {
                    alert(data.msg); btn.innerHTML = 'Update Password <iconify-icon icon="solar:check-circle-linear"></iconify-icon>';
                }
            } catch (err) {
                alert('Connection error.'); btn.innerHTML = 'Update Password';
            }
        });
    </script>
</body>
</html>
